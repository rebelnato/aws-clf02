  {q:"An application passes transactions between an ordering service and an invoicing service. To ensure that an outage in the invoicing service does not crash the ordering service, which pull-based message queuing service should be used to decouple them?",options:["Amazon SNS","Amazon SQS","Amazon API Gateway","AWS Step Functions"],answer:1,multi:false,explanation:"Amazon SQS uses an asynchronous message queue to decouple microservices, allowing them to scale independently."},
  {q:"A monitoring application needs to instantly broadcast a single system failure alert to an AWS Lambda function, an administrator’s mobile phone via SMS, and an SQS queue simultaneously using a push-based model. Which service handles this fan-out pattern?",options:["Amazon SQS","Amazon Kinesis","Amazon SNS","Amazon EventBridge"],answer:2,multi:false,explanation:"Amazon SNS uses a publish/subscribe model to push single notifications out to multiple endpoints simultaneously."},
  {q:"A financial analytics application needs to collect, process, and evaluate massive volumes of high-velocity stock market data streams in real-time. Which AWS service is designed to ingest this type of streaming data?",options:["Amazon SQS","Amazon Kinesis","Amazon SNS","AWS AppSync"],answer:1,multi:false,explanation:"Amazon Kinesis is designed to ingest and analyze massive volumes of high-velocity, real-time streaming data payloads."},
  {q:"A company has built several serverless AWS Lambda functions. They want to create a secure, managed web API layer that acts as the \"front door\" for mobile applications to trigger these backend functions. Which service should they deploy?",options:["AWS Amplify","Amazon API Gateway","AWS Transit Gateway","Amazon EventBridge"],answer:1,multi:false,explanation:"Amazon API Gateway acts as the secure entryway (\"front door\") for frontend applications to access backend database APIs and compute logic."},
  {q:"A cloud architect needs to coordinate a multi-step serverless customer signup workflow that executes five separate AWS Lambda functions in sequence, handles errors at each phase, and maintains the application's state. Which service should they use?",options:["Amazon EventBridge","AWS Step Functions","Amazon SQS","Amazon SNS"],answer:1,multi:false,explanation:"AWS Step Functions uses a visual state machine framework to coordinate multiple serverless actions into sequential workflows."},
  {q:"A developer wants to build an event-driven architecture that automatically triggers an administrative workflow whenever an S3 bucket configuration changes. They need a serverless event bus to ingest, filter, and route these infrastructure events. Which service fits this requirement?",options:["Amazon EventBridge","Amazon API Gateway","Amazon Kinesis","AWS AppSync"],answer:0,multi:false,explanation:"Amazon EventBridge is a serverless event bus service that ingests and routes infrastructure event metrics to target destinations."},
  {q:"Which free AWS service allows you to securely manage access to cloud infrastructure by creating individual users, groupings, roles, and fine-grained JSON permission statements?",options:["AWS IAM Identity Center","AWS IAM","AWS Directory Service","AWS Secrets Manager"],answer:1,multi:false,explanation:"AWS IAM is the free central service used to manage secure access to resources using Users, Groups, Roles, and permission statements."},
  {q:"An enterprise security team wants employees to log in once using their single corporate profile to access multiple separate AWS accounts within the company's AWS Organization. Which service provides this central Single Sign-On (SSO) experience?",options:["AWS IAM Identity Center","Amazon Cognito","AWS Directory Service","AWS Secrets Manager"],answer:0,multi:false,explanation:"IAM Identity Center handles central Single Sign-On (SSO) administration for multi-account corporate dashboard platforms."},
  {q:"A company wants to connect its existing on-premises Microsoft Active Directory directly to the AWS cloud so employees can log into the console using their daily office desktop passwords. Which service enables this integration?",options:["AWS IAM Identity Center","AWS Directory Service","Amazon Cognito","AWS Shield"],answer:1,multi:false,explanation:"AWS Directory Service bridges existing on-premises Microsoft Active Directories to AWS cloud access frames."},
  {q:"An application requires access to a database password that must be automatically rotated every 30 days according to company security policies. Which service securely stores and handles the automated lifecycle rotation of these credentials?",options:["Systems Manager Parameter Store","AWS Secrets Manager","AWS KMS","AWS Artifact"],answer:1,multi:false,explanation:"AWS Secrets Manager securely stores and automatically rotates credentials for database accounts and API keys."},
  {q:"A public website running on AWS needs automated perimeter protection against Distributed Denial of Service (DDoS) attacks. Which service provides standard, always-on protection at no extra cost?",options:["AWS WAF","AWS Shield","AWS Network Firewall","Amazon Inspector"],answer:1,multi:false,explanation:"AWS Shield provides automated protection against Distributed Denial of Service (DDoS) attacks at the perimeter of the network."},
  {q:"A security administrator wants to protect a web application from common application-layer web exploits, such as SQL Injection and Cross-Site Scripting (XSS), by filtering custom HTTP traffic rules. Which service should they use?",options:["AWS Shield","AWS WAF","Security Groups","Network ACLs"],answer:1,multi:false,explanation:"AWS WAF protects web applications from application-layer exploits (like SQL injection) by filtering custom HTTP traffic rules."},
  {q:"An enterprise auditor requires immediate access to AWS's official ISO and PCI compliance certificates and global security agreement documents. Which free self-service portal provides direct access to these reports?",options:["AWS Trusted Advisor","AWS Artifact","AWS Config","AWS Shield"],answer:1,multi:false,explanation:"AWS Artifact is a free self-service portal providing instant access to AWS's security compliance reports and agreements."},
  {q:"A DevOps engineer needs to model and provision an entire stack of identical AWS infrastructure resources repeatedly across multiple test accounts using a single declarative YAML configuration text file. Which Infrastructure as Code (IaC) service should they use?",options:["AWS Elastic Beanstalk","AWS CloudFormation","AWS CDK","AWS OpsWorks"],answer:1,multi:false,explanation:"AWS CloudFormation is an Infrastructure as Code (IaC) tool that provisions resources using declarative JSON or YAML text templates."},
  {q:"A development team wants to define their AWS cloud infrastructure using their existing programming language skills in Python and TypeScript, rather than writing static JSON or YAML text templates. Which software framework should they choose?",options:["AWS SDK","AWS CDK","AWS CloudFormation","AWS CLI"],answer:1,multi:false,explanation:"AWS CDK lets you define cloud infrastructure using regular programming languages that compile down into CloudFormation templates."},
  {q:"A developer wants to quickly write, run, and debug application code using a web browser without having to download or install an Integrated Development Environment (IDE) on their local laptop. Which service should they use?",options:["AWS CloudShell","AWS Cloud9","AWS Systems Manager","AWS CodeCommit"],answer:1,multi:false,explanation:"AWS Cloud9 is a browser-based Integrated Development Environment (IDE) used to write and run code without local tools."},
  {q:"An administrator needs to quickly run a few AWS CLI commands directly from inside the AWS Management Console browser window without configuring access keys or installing tools on their machine. Which free, pre-authenticated terminal environment should they open?",options:["AWS Cloud9","AWS CloudShell","AWS Tools for PowerShell","AWS Systems Manager Session Manager"],answer:1,multi:false,explanation:"AWS CloudShell provides a free, pre-authenticated command-line terminal directly in the web console to run CLI commands."},
  {q:"A mobile app developer wants to quickly build a frontend interface, configure a secure authentication backend, host static assets, and deploy the entire application seamlessly. Which purpose-built suite should they leverage?",options:["AWS AppSync","AWS Amplify","AWS Step Functions","AWS Elastic Beanstalk"],answer:1,multi:false,explanation:"AWS Amplify gives mobile and frontend developers a suite of tools to quickly build backends and host static assets."},
  {q:"A team wants to deploy a secure GraphQL API endpoint that allows their mobile applications to query data dynamically from multiple backend tables in a single request. Which managed service should they choose?",options:["Amazon API Gateway","AWS AppSync","Amazon SNS","AWS Step Functions"],answer:1,multi:false,explanation:"AWS AppSync is a managed service used to deploy secure, scalable GraphQL APIs that can query multiple data sources."},
  {q:"A hospital wants to use AWS compute and storage capabilities but is required by data privacy laws to keep patient data physically inside their on-premises building. Which hybrid cloud service delivers native physical AWS server racks directly to the customer's facility?",options:["AWS Local Zones","AWS Outposts","AWS Wavelength","AWS Snowball Edge"],answer:1,multi:false,explanation:"AWS Outposts delivers physical server racks directly to on-premises data centers to meet local data residency requirements."},
  {q:"A company wants to run latency-sensitive applications closer to end-users located in a major metropolitan city that does not contain a primary AWS Region. Which hybrid infrastructure deployment model should they target?",options:["AWS Outposts","AWS Local Zones","AWS Wavelength","AWS Direct Connect"],answer:1,multi:false,explanation:"AWS Local Zones place compute and storage resources closer to large metropolitan cities where no standard AWS Region exists."},
  {q:"A mobile gaming startup needs single-digit millisecond latency to communicate with users on 5G devices. Which AWS infrastructure feature embeds compute and storage resources directly inside telecommunications providers' 5G data networks ?",options:["AWS Local Zones","AWS Wavelength","AWS Outposts","Amazon CloudFront"],answer:1,multi:false,explanation:"AWS Wavelength integrates compute and storage inside telecommunications providers' 5G networks to minimize latency for mobile devices ."},
  {q:"An oil drilling rig operating in a remote maritime location with zero internet connectivity needs to collect and store 60 Terabytes of local operational telemetry data before physically transporting the hardware back to an AWS data center. Which service family handles this?",options:["AWS Storage Gateway","AWS Snow Family","AWS Outposts","AWS DataSync"],answer:1,multi:false,explanation:"The AWS Snow Family provides physical hardware devices to migrate massive amounts of data or run compute in disconnected environments."},
  {q:"An automated tool is required to scan an AWS environment and provide real-time recommendations to reduce costs by identifying idle resources, while also checking for security flaws like open port rules. Which service should be used?",options:["AWS Compute Optimizer","AWS Trusted Advisor","AWS Budgets","AWS Config"],answer:1,multi:false,explanation:"AWS Trusted Advisor provides automated recommendations to optimize cost, security, performance, and fault tolerance against best practices."},
  {q:"A company wants to analyze the historical performance data of its EC2 instance fleet over the past month to get machine learning-driven sizing recommendations on whether specific instances are over-provisioned. Which tool provides this?",options:["AWS Trusted Advisor","AWS Compute Optimizer","AWS Cost Explorer","AWS Systems Manager"],answer:1,multi:false,explanation:"AWS Compute Optimizer uses machine learning to evaluate configuration history and recommend optimal resource sizes to reduce waste."},
  {q:"A financial controller needs to visually graph the organization's cloud spending over the past twelve months and review machine learning cost forecasts for the upcoming business quarter. Which service provides these visualization features?",options:["AWS Pricing Calculator","AWS Cost Explorer","AWS Budgets","AWS Systems Manager"],answer:1,multi:false,explanation:"AWS Cost Explorer provides a visual interface to analyze historical spending patterns and project future cost trends."},
  {q:"A cloud administrator wants to configure an alert that will automatically send an email notification the moment the company’s monthly cloud spend is forecasted to exceed $500. Which tool should they use?",options:["AWS Cost Explorer","AWS Budgets","AWS Trusted Advisor","AWS Pricing Calculator"],answer:1,multi:false,explanation:"AWS Budgets allows you to set custom thresholds and alert you via email when costs exceed (or are forecasted to exceed) your budget."},
  {q:"An enterprise company owns twelve separate AWS accounts across different business units. They want to centralize their billing invoices to take advantage of volume discounts, and enforce security policies using Service Control Policies (SCPs). Which service should they use?",options:["AWS IAM Identity Center","AWS Organizations","AWS Control Tower","AWS Trusted Advisor"],answer:1,multi:false,explanation:"AWS Organizations allows you to centrally manage multiple accounts, leverage consolidated billing, and enforce Service Control Policies (SCPs)."},
  {q:"An enterprise company wants to completely isolate its development workloads from its production workloads so that a developer's mistake cannot accidentally delete live client data. Which AWS boundary structure should the company use to enforce this absolute baseline isolation?",options:["Separate IAM Users","Separate AWS Accounts","Separate IAM Groups","Separate IAM Roles"],answer:1,multi:false,explanation:"Separate AWS Accounts"},
  {q:"A cloud administrator needs to create a new access profile for a newly hired database engineer named Sarah. This profile must sit inside the existing corporate environment, use specific permission constraints, and have no independent billing profile. What should the administrator provision?",options:["A new AWS Account","A new IAM User","A new AWS Organization Management Node","A new AWS Root Tenant Profile"],answer:1,multi:false,explanation:"A new IAM User"},
  {q:"An enterprise architecture team needs to establish a rigid security boundary to isolate their corporate billing invoices and guarantee that a developer's infrastructure modifications cannot impact the production environment. Which boundary framework should they deploy?",options:["Separate IAM User Groups","Separate AWS Accounts","Separate IAM Policy Versions","Separate Multi-Factor Authentication Devices"],answer:1,multi:false,explanation:"Separate AWS Accounts"},
  {q:"A cloud administrator is onboarding a new systems operator. The new employee needs unique login credentials to write code and manage resources inside the company's existing cloud deployment, without creating any independent billing structures. What should the administrator provision?",options:["A new AWS Account","A new IAM User","A new AWS Root Tenant","A new AWS Organizations Management Node"],answer:1,multi:false,explanation:"A new IAM User"},
  {q:"A large enterprise company wants to programmatically spin up separate AWS environments for individual engineering teams while ensuring all monthly costs are rolled into a single centralized invoice. Which service should the company leverage?",options:["AWS IAM Identity Center","AWS Control Tower","AWS Organizations","AWS Systems Manager"],answer:2,multi:false,explanation:"AWS Organizations"},
  {q:"A cloud administrator uses AWS Organizations to manage twenty member accounts. They want to ensure that no one—including the root user—in any of the development member accounts can disable AWS CloudTrail. What feature should the administrator use?",options:["IAM Inline Policies","Service Control Policies (SCPs)","Amazon GuardDuty","VPC Network ACLs"],answer:1,multi:false,explanation:"Service Control Policies (SCPs)"},
  {q:"A company has configured an AWS Organization with a Production AWS Account and a Development AWS Account. A system administrator creates an IAM User named Developer_Alex inside the Development AWS Account. Without explicit cross-account setup, what resources can Developer_Alex access?",options:["Resources in both the Production and Development AWS Accounts.","Only resources inside the Development AWS Account, subject to IAM policies.","Only billing dashboards in the master Management Account.","All resources globally across the entire AWS platform."],answer:1,multi:false,explanation:"Only resources inside the Development AWS Account, subject to IAM policies."},
  {q:"An enterprise company wants to avoid the operational mess of creating individual, manual IAM User profiles inside fifty separate member AWS Accounts. Which service should they implement alongside AWS Organizations to allow employees to log into any assigned account using a single identity?",options:["AWS IAM Identity Center","AWS Secrets Manager","AWS CloudTrail","Amazon Cognito"],answer:0,multi:false,explanation:"AWS IAM Identity Center"},
  {q:"An administrator attaches a Service Control Policy (SCP) to a top-level Organizational Unit (OU) called \"Engineering\". The Engineering OU contains a sub-OU named \"Testing\", which holds five member accounts. How does the SCP impact the \"Testing\" sub-OU?",options:["The SCP has no effect on the Testing sub-OU because policies do not cascade.","The Testing sub-OU and its five member accounts automatically inherit the SCP guardrails .","The SCP will completely delete the configurations inside the Testing sub-OU.","The master Management account will lose its access to the Testing sub-OU."],answer:1,multi:false,explanation:"The Testing sub-OU and its five member accounts automatically inherit the SCP guardrails ."},
  {q:"Which identity profile is completely unaffected by an activated Service Control Policy (SCP) restriction within an AWS Organization?",options:["The Root User of a member account","An IAM Administrator User inside a member account","An IAM Role assumed by an EC2 instance in a member account","Any user or role operating inside the master Management account"],answer:3,multi:false,explanation:"Any user or role operating inside the master Management account"},
  {q:"A large enterprise wants to implement an automated framework to easily launch new, secure, multi-account AWS environments that follow corporate compliance standards out of the box. Which AWS service provides this \"Landing Zone\" setup?",options:["AWS CloudFormation","AWS Control Tower","AWS Systems Manager","AWS Trusted Advisor"],answer:1,multi:false,explanation:"AWS Control Tower"},
  {q:"What is the primary purpose of the \"Account Factory\" feature within AWS Control Tower?",options:["To manufacture physical server hardware for on-premises data centers.","To automate the creation of new AWS member accounts with pre-configured security baseline settings.","To generate monthly discount coupons for retail purchases on Amazon.com.","To automatically delete inactive user profiles after 90 days."],answer:1,multi:false,explanation:"To automate the creation of new AWS member accounts with pre-configured security baseline settings."},

l charges and send an alert via Amazon SNS if they cross a fixed numeric threshold."},{name:"AWS Cost Explorer",desc:"An interactive reporting interface used to graph, analyze, and visualize your historical spending trends (past 12 months) and look at upcoming quarterly spending forecasts."},{name:"Programmatic Pricing APIs",desc:"Development endpoints that allow automated scripts to query the real-time cost matrices of AWS services programmatically without viewing web pages."},{name:"AWS Savings Plans",desc:"Flexible discount commitment contracts where you agree to spend a consistent dollar amount per hour for 1 or 3 years in exchange for significant compute cost reductions across EC2, Lambda, and Fargate."}]},

const examTips=[
  {tip:"Scenario mentions declarative text templates (JSON or YAML)",answer:"AWS CloudFormation"},
  {tip:"Scenario mentions programming languages (Python, TypeScript)",answer:"AWS CDK"},
  {tip:"Scenario highlights uploading code and letting AWS handle the rest",answer:"AWS Elastic Beanstalk"},
  {tip:"Scenario explicitly specifies Chef or Puppet automation",answer:"AWS OpsWorks"},
  {tip:"Scenario mentions pre-approved corporate IT templates for employees",answer:"AWS Service Catalog"}
];

// ── TAB ──
function switchTab(n,b){document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.side-btn').forEach(x=>x.classList.remove('active'));document.getElementById('tab-'+n).classList.add('active');b.classList.add('active');}
function toggleNav(){const nav=document.getElementById('left-nav');nav.classList.toggle('collapsed');}

// ── PAGINATION ──
const PAGE_SIZE=1;
const LS_ANSWERS='clf_answers';
const LS_PAGE='clf_page';
const LS_SUBMITTED='clf_submitted';

function saveState(){
  try{
    localStorage.setItem(LS_ANSWERS,JSON.stringify(userAnswers));
    localStorage.setItem(LS_PAGE,currentPage);
    localStorage.setItem(LS_SUBMITTED,submitted?'1':'0');
  }catch(e){}
}
function loadState(){
  try{
    const a=localStorage.getItem(LS_ANSWERS);
    if(a){const parsed=JSON.parse(a);if(Array.isArray(parsed)&&parsed.length===questions.length)userAnswers=parsed;}
    const p=localStorage.getItem(LS_PAGE);
    if(p!==null)currentPage=Math.min(parseInt(p),questions.length-1);
    submitted=localStorage.getItem(LS_SUBMITTED)==='1';
    answered=userAnswers.filter(a=>a!==null).length;
  }catch(e){}
}
function clearState(){
  try{localStorage.removeItem(LS_ANSWERS);localStorage.removeItem(LS_PAGE);localStorage.removeItem(LS_SUBMITTED);}catch(e){}
}

let currentPage=0;
let answered=0,submitted=false;
let userAnswers=new Array(questions.length).fill(null);
loadState();

function totalPages(){return Math.ceil(questions.length/PAGE_SIZE);}

function buildPageNav(){
  const nav=document.getElementById('page-nav');
  nav.innerHTML='';
  const tp=totalPages();
  for(let i=0;i<tp;i++){
    const b=document.createElement('button');
    let cls='pn-btn';
    if(i===currentPage) cls+=' active';
    if(userAnswers[i]!==null) cls+=' answered';
    b.className=cls;
    b.textContent=i+1;
    b.id='pnb-'+i;
    b.onclick=(()=>{const p=i;return()=>goToPage(p);})();
    nav.appendChild(b);
  }
  // scroll active button into view inside the panel
  const active=document.getElementById('pnb-'+currentPage);
  if(active) active.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function goToPage(p){
  currentPage=p;
  saveState();
  renderPage();
  document.getElementById('exam-container').scrollIntoView({behavior:'smooth'});
}

function changePage(dir){
  const np=currentPage+dir;
  if(np>=0&&np<totalPages())goToPage(np);
}

function renderPage(){
  const start=currentPage*PAGE_SIZE;
  const end=Math.min(start+PAGE_SIZE,questions.length);
  const wrapper=document.getElementById('questions-wrapper');
  wrapper.innerHTML='';
  const tp=totalPages();
  document.getElementById('page-label').textContent=`Question ${currentPage+1} of ${tp}`;
  document.getElementById('btn-prev').disabled=currentPage===0;
  document.getElementById('btn-next').disabled=currentPage===tp-1;
  buildPageNav();

  for(let idx=start;idx<end;idx++){
    const q=questions[idx];
    const card=document.createElement('div');
    card.className='question-card';
    const inputType=q.multi?'checkbox':'radio';
    card.innerHTML=`<div class="q-number">Question ${idx+1} of ${questions.length}${q.multi?' <span style="font-size:.7rem;background:#f6ad55;color:#744210;padding:2px 7px;border-radius:10px;font-weight:700">SELECT TWO</span>':''}</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts-${idx}"></div>
      <div class="explanation" id="exp-${idx}"><strong>Explanation:</strong> ${q.explanation}</div>`;
    const od=card.querySelector('#opts-'+idx);
    q.options.forEach((opt,oi)=>{
      const lbl=document.createElement('label');
      lbl.className='opt-label';lbl.id=`opt-${idx}-${oi}`;
      lbl.innerHTML=`<input type="${inputType}" name="q${idx}" value="${oi}"> <span>${String.fromCharCode(65+oi)}) ${opt}</span>`;
      const inp=lbl.querySelector('input');
      // restore saved answer
      if(userAnswers[idx]!==null){
        if(q.multi&&Array.isArray(userAnswers[idx])){if(userAnswers[idx].includes(oi))inp.checked=true;}
        else if(!q.multi&&userAnswers[idx]===oi)inp.checked=true;
      }
      inp.addEventListener('change',()=>onAnswer(idx));
      od.appendChild(lbl);
    });
    // if submitted, show results
    if(submitted)applyResultStyles(idx);
    wrapper.appendChild(card);
  }
}

function onAnswer(idx){
  if(submitted)return;
  const q=questions[idx];
  if(q.multi){
    const checked=[...document.querySelectorAll(`input[name="q${idx}"]:checked`)].map(r=>parseInt(r.value));
    userAnswers[idx]=checked.length?checked:null;
  }else{
    const r=document.querySelector(`input[name="q${idx}"]:checked`);
    userAnswers[idx]=r?parseInt(r.value):null;
  }
  answered=userAnswers.filter(a=>a!==null).length;
  updateProgress();
  saveState();
}

function updateProgress(){}

function submitExam(){
  if(submitted)return;
  submitted=true;
  document.getElementById('submit-btn').disabled=true;
  let correct=0,incorrect=0,skipped=0;
  questions.forEach((_,idx)=>{
    const ua=userAnswers[idx];
    const q=questions[idx];
    if(ua===null){skipped++;return;}
    let isCorrect;
    if(q.multi){
      const ans=Array.isArray(q.answer)?q.answer:[q.answer];
      isCorrect=Array.isArray(ua)&&ua.length===ans.length&&ans.every(a=>ua.includes(a));
    }else{isCorrect=ua===q.answer;}
    if(isCorrect)correct++;else incorrect++;
  });
  renderPage();
  showResults(correct,incorrect,skipped);
  saveState();
}

function applyResultStyles(idx){
  const q=questions[idx];
  const ua=userAnswers[idx];
  const expEl=document.getElementById(`exp-${idx}`);
  if(expEl)expEl.style.display='block';
  const radios=document.querySelectorAll(`input[name="q${idx}"]`);
  radios.forEach(r=>r.disabled=true);
  const correctAnswers=q.multi?(Array.isArray(q.answer)?q.answer:[q.answer]):[q.answer];
  const addBadge=(id,txt)=>{const el=document.getElementById(id);if(!el)return;const b=document.createElement('span');b.className='badge';b.textContent=txt;el.appendChild(b);};
  if(ua===null){
    correctAnswers.forEach(a=>{const el=document.getElementById(`opt-${idx}-${a}`);if(el){el.classList.add('missed');addBadge(`opt-${idx}-${a}`,'Correct Answer');}});
    return;
  }
  const selectedArr=Array.isArray(ua)?ua:[ua];
  let isCorrect;
  if(q.multi){isCorrect=selectedArr.length===correctAnswers.length&&correctAnswers.every(a=>selectedArr.includes(a));}
  else{isCorrect=ua===q.answer;}
  selectedArr.forEach(s=>{
    const el=document.getElementById(`opt-${idx}-${s}`);if(!el)return;
    if(correctAnswers.includes(s)){el.classList.add('correct');addBadge(`opt-${idx}-${s}`,'✓ Correct');}
    else{el.classList.add('incorrect');addBadge(`opt-${idx}-${s}`,'✗ Wrong');}
  });
  if(!isCorrect){correctAnswers.forEach(a=>{if(!selectedArr.includes(a)){const el=document.getElementById(`opt-${idx}-${a}`);if(el){el.classList.add('missed');addBadge(`opt-${idx}-${a}`,'Correct Answer');}}});}
}

function showResults(c,inc,sk){
  const pct=Math.round(c/questions.length*100);
  const b=document.getElementById('results-banner');b.style.display='block';
  b.scrollIntoView({behavior:'smooth'});
  const sd=document.getElementById('score-display');
  sd.textContent=`${c} / ${questions.length}  (${pct}%)`;
  sd.className=pct>=70?'great':pct>=50?'okay':'poor';
  document.getElementById('grade-label').textContent=pct>=90?'🏆 Outstanding! Exam-ready.':pct>=70?'✅ Good work! Above passing threshold.':pct>=50?'⚠️ Getting there — review explanations.':'📖 Keep studying — review each explanation.';
  document.getElementById('stat-c').textContent=c;
  document.getElementById('stat-i').textContent=inc;
  document.getElementById('stat-s').textContent=sk;
}

function retryExam(){
  submitted=false;answered=0;currentPage=0;
  userAnswers=new Array(questions.length).fill(null);
  clearState();
  document.getElementById('results-banner').style.display='none';
  document.getElementById('submit-btn').disabled=false;
  updateProgress();renderPage();
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetExam(){
  if(!confirm('Reset all answers? This cannot be undone.'))return;
  submitted=false;answered=0;currentPage=0;
  userAnswers=new Array(questions.length).fill(null);
  clearState();
  document.getElementById('results-banner').style.display='none';
  document.getElementById('submit-btn').disabled=false;
  updateProgress();renderPage();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── SERVICES ──
let activeFilter='All';
function buildServices(){
  const fb=document.getElementById('filter-btns');
  ['All',...serviceData.map(s=>s.tag)].filter((v,i,a)=>a.indexOf(v)===i).forEach(tag=>{
    const btn=document.createElement('button');
    btn.className='flt-btn'+(tag==='All'?' active':'');btn.textContent=tag;
    btn.onclick=()=>{activeFilter=tag;document.querySelectorAll('.flt-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filterServices();};
    fb.appendChild(btn);
  });
  const sw=document.getElementById('services-wrapper');
  const tip=document.createElement('div');tip.className='tip-box';tip.id='tips-box';
  tip.innerHTML=`<h3>⚠️ Common Exam Distinctions</h3><ul>${examTips.map(t=>`<li><strong>${t.tip}</strong> → <span style="color:#dd6b20;font-weight:700">${t.answer}</span></li>`).join('')}</ul>`;
  sw.appendChild(tip);
  serviceData.forEach((sec,si)=>{
    const sd=document.createElement('div');sd.className='svc-section';sd.dataset.tag=sec.tag;sd.id='sec-'+si;
    sd.innerHTML=`<div class="svc-section-title">${sec.category}</div><div class="svc-grid" id="grid-${si}"></div>`;
    const grid=sd.querySelector('#grid-'+si);
    sec.services.forEach(svc=>{
      const card=document.createElement('div');card.className='svc-card';
      card.dataset.name=svc.name.toLowerCase();card.dataset.desc=svc.desc.toLowerCase();
      card.innerHTML=`<span class="svc-tag" style="background:${sec.color}">${sec.tag}</span><div class="svc-name">${svc.name}</div><div class="svc-desc">${svc.desc}</div>`;
      grid.appendChild(card);
    });
    sw.appendChild(sd);
  });
}
function filterServices(){
  const q=document.getElementById('svc-search').value.toLowerCase().trim();
  document.getElementById('tips-box').style.display=(activeFilter==='All'&&!q)?'block':'none';
  let total=0;
  serviceData.forEach((sec,si)=>{
    const sd=document.getElementById('sec-'+si);
    if(activeFilter!=='All'&&sec.tag!==activeFilter){sd.style.display='none';return;}
    let vis=0;
    sd.querySelectorAll('.svc-card').forEach(card=>{
      const match=!q||card.dataset.name.includes(q)||card.dataset.desc.includes(q);
      card.style.display=match?'':'none';if(match)vis++;
    });
    sd.style.display=vis>0?'':'none';total+=vis;
  });
  document.getElementById('no-results').style.display=total===0?'block':'none';
}

// ── INIT ──
renderPage();
if(submitted){
  // restore post-submit state
  document.getElementById('submit-btn').disabled=true;
  let correct=0,incorrect=0,skipped=0;
  questions.forEach((_,idx)=>{
    const ua=userAnswers[idx];const q=questions[idx];
    if(ua===null){skipped++;return;}
    let ok;
    if(q.multi){const ans=Array.isArray(q.answer)?q.answer:[q.answer];ok=Array.isArray(ua)&&ua.length===ans.length&&ans.every(a=>ua.includes(a));}
    else{ok=ua===q.answer;}
    if(ok)correct++;else incorrect++;
  });
  showResults(correct,incorrect,skipped);
}
buildServices();
</script>
